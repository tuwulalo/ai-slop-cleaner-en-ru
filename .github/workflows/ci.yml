name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate SKILL.md against the Agent Skills spec
        run: node validate.mjs
      - name: Run marker-set regression eval
        run: node eval/run.mjs
